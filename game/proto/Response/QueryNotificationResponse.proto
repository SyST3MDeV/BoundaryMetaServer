syntax = "proto3";

package ProjectBoundary;

message NotificationEntity{
    string Id = 1;
    string Title = 2;
    string Content = 3;
    string Background = 4;
    string LanguageCode = 5;
    string Platform = 6;
    int32 Unknown1 = 7;
    string Timezone = 8;
    int32 Unknown2 = 9;
}

message QueryNotificationResponse{
    int32 Unknown = 1;
    string ErrorMessage = 2;
    repeated NotificationEntity Notifications = 3;
}